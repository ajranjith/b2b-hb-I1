name: Trigger auto deployment for hb-frontend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/hb-frontend-AutoDeployTrigger-708c640b-934c-4a77-af6c-f0d90962e0ad.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.HBFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HBFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HBFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.HBFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.HBFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: hb-frontend
          resourceGroup: rg1-hb1-b2b-dev
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


