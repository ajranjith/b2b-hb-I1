name: Build and Deploy Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: hotbray-admin
  ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  APP_PORT: 5173

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Image
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          TAG=${{ github.sha }}
          docker build             --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}             --build-arg NEXT_PUBLIC_WEB_DOMAIN=${{ secrets.NEXT_PUBLIC_WEB_DOMAIN }}             --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}             -t ${IMAGE}:${TAG}             -t ${IMAGE}:latest             .
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest

      - name: Set App Settings
        run: |
          az webapp config appsettings set             --resource-group ${{ env.RESOURCE_GROUP }}             --name ${{ env.WEBAPP_NAME }}             --settings               PORT=${{ env.APP_PORT }}               WEBSITES_PORT=${{ env.APP_PORT }}               NEXT_PUBLIC_WEB_DOMAIN=${{ secrets.NEXT_PUBLIC_WEB_DOMAIN }}               NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}               NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Update App Service Container
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          az webapp config container set             --resource-group ${{ env.RESOURCE_GROUP }}             --name ${{ env.WEBAPP_NAME }}             --container-image-name ${IMAGE}             --container-registry-url https://${{ env.ACR_LOGIN_SERVER }}             --enable-app-service-storage false

      - name: Restart App Service
        run: az webapp restart --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.WEBAPP_NAME }}
